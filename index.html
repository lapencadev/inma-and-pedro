<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Inma & Pedro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="container">

  <div class="header">
    <h1>INMA & PEDRO</h1>
    <p>Destino final · 15 · 08 · 2026</p>
    <br>
    <br>
  </div>

  <div class="countdown">
    <div class="time-box">
      <div class="number" id="days">0</div>
      <div class="label">Días</div>
    </div>
    <div class="time-box">
      <div class="number" id="hours">0</div>
      <div class="label">Horas</div>
    </div>
    <div class="time-box">
      <div class="number" id="minutes">0</div>
      <div class="label">Minutos</div>
    </div>
    <div class="time-box">
      <div class="number" id="seconds">0</div>
      <div class="label">Segundos</div>
    </div>
  </div>

  <section class="monthly-egg" id="monthlyEgg" aria-live="polite"></section>

    <br><br>
  <div class="travel-text" id="travelText"></div>

</div>

  <div class="footer-logo">
    <img src="comite-inma-sf.png" alt="Comite Inma" />
  </div>

<script src="script.js"></script>

</body>
</html>
